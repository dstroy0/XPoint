# git-cliff configuration for XPoint
# Docs: https://git-cliff.org/docs/configuration

[changelog]
header = """
# Changelog

All notable changes to XPoint are documented here.\n
"""
body = """
{% if version %}\
## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
## [Unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | upper_first }}
{% for commit in commits %}\
- {{ commit.message | split(pat="\n") | first | trim }} \
([`{{ commit.id | truncate(length=7, end="") }}`](https://github.com/dstroy0/XPoint/commit/{{ commit.id }}))
{% endfor %}
{% endfor %}\n
"""
trim = true
footer = ""

[git]
conventional_commits = true
filter_unconventional = false  # include all commits, not just conventional ones
split_commits = false
commit_parsers = [
  { message = "^feat",                  group = "Features"       },
  { message = "^fix",                   group = "Bug Fixes"      },
  { message = "^doc|^docs",             group = "Documentation"  },
  { message = "^perf",                  group = "Performance"    },
  { message = "^refactor",              group = "Refactor"       },
  { message = "^test",                  group = "Testing"        },
  { message = "^ci|^build|^chore",      group = "CI / Build"     },
  { message = ".*",                     group = "Changes"        },
]
protect_breaking_commits = false
filter_commits = false
tag_pattern = "v[0-9]*"
sort_commits = "newest"
topo_order = false
